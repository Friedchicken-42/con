name: build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: setup
        run: |
          sudo apt update
          sudo apt install build-essential
      - name: gcc
        run: gcc -Wall -Werror *.c
          
